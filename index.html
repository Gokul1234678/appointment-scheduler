<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CapMinds – Appointment Scheduler</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --blue:       #1976d2;
  --blue-light: #e3f0fb;
  --blue-dark:  #1256a0;
  --red:        #e53935;
  --red-logo:   #d32f2f;
  --green:      #43a047;
  --gray-50:    #f5f6fa;
  --gray-100:   #eef0f4;
  --gray-200:   #dde1e9;
  --gray-300:   #bfc5d1;
  --gray-400:   #8d97a8;
  --gray-600:   #505c6f;
  --gray-800:   #2a3241;
  --white:      #ffffff;
  --radius:     6px;
  --shadow:     0 2px 12px rgba(0,0,0,.10);
  --shadow-lg:  0 8px 32px rgba(0,0,0,.15);
  --font:       'Segoe UI', system-ui, sans-serif;
  --sidebar-w:  200px;
  --topbar-h:   56px;
}

body { font-family: var(--font); background: var(--gray-50); color: var(--gray-800); min-height: 100vh; overflow-x: hidden; }

/* ══ TOPBAR ══ */
.topbar {
  background: var(--white);
  border-bottom: 1px solid var(--gray-200);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 20px;
  height: var(--topbar-h);
  position: sticky;
  top: 0;
  z-index: 300;
  box-shadow: 0 1px 4px rgba(0,0,0,.07);
  gap: 12px;
}
.topbar-left { display: flex; align-items: center; gap: 10px; }

/* Hamburger — ALWAYS in topbar, ALWAYS visible */
.hamburger {
  background: none;
  border: none;
  cursor: pointer;
  display: flex;
  flex-direction: column;
  justify-content: center;
  gap: 5px;
  width: 36px;
  height: 36px;
  padding: 6px;
  border-radius: 4px;
  flex-shrink: 0;
  transition: background .15s;
}
.hamburger:hover { background: var(--gray-100); }
.hamburger span {
  display: block;
  height: 2px;
  background: var(--gray-600);
  border-radius: 2px;
  transition: transform .25s, opacity .25s;
  width: 100%;
}
.hamburger.is-open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
.hamburger.is-open span:nth-child(2) { opacity: 0; transform: scaleX(0); }
.hamburger.is-open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

.logo {
  display: flex;
  align-items: center;
  gap: 8px;
  font-weight: 700;
  font-size: 17px;
  color: var(--gray-800);
  white-space: nowrap;
}
.logo-diamond {
  width: 26px; height: 26px;
  background: var(--red-logo);
  transform: rotate(45deg);
  border-radius: 3px;
  flex-shrink: 0;
}

.btn-book {
  background: var(--blue);
  color: var(--white);
  border: none;
  padding: 8px 16px;
  border-radius: var(--radius);
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 5px;
  white-space: nowrap;
  flex-shrink: 0;
  transition: background .18s;
}
.btn-book:hover { background: var(--blue-dark); }

/* ══ LAYOUT ══ */
.app-body { display: flex; min-height: calc(100vh - var(--topbar-h)); position: relative; }

/* ══ BACKDROP ══ */
.sidebar-backdrop {
  display: none;
  position: fixed;
  inset: 0;
  top: var(--topbar-h);
  background: rgba(0,0,0,.45);
  z-index: 198;
}
.sidebar-backdrop.show { display: block; }

/* ══ SIDEBAR ══ */
.sidebar {
  width: var(--sidebar-w);
  background: var(--white);
  border-right: 1px solid var(--gray-200);
  padding: 14px 0;
  flex-shrink: 0;
  overflow: hidden;
  /* Desktop: slide width */
  transition: width .25s ease;
}
.sidebar.collapsed { width: 0; border-right: none; }

.nav-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 20px;
  cursor: pointer;
  color: var(--gray-600);
  font-size: 14px;
  font-weight: 500;
  white-space: nowrap;
  transition: background .15s, color .15s;
  user-select: none;
}
.nav-item.active { color: var(--blue); background: var(--blue-light); }
.nav-item:hover:not(.active) { background: var(--gray-100); }
.nav-icon { font-size: 18px; flex-shrink: 0; }

/* ══ MOBILE: sidebar becomes a fixed overlay drawer ══ */
@media (max-width: 768px) {
  .sidebar {
    /* Override: use position fixed + translateX instead of width */
    position: fixed !important;
    left: 0 !important;
    top: var(--topbar-h) !important;
    height: calc(100vh - var(--topbar-h)) !important;
    width: var(--sidebar-w) !important;
    z-index: 199;
    border-right: 1px solid var(--gray-200) !important;
    box-shadow: 4px 0 20px rgba(0,0,0,.15);
    /* Hide by sliding left */
    transform: translateX(-100%);
    transition: transform .25s ease !important;
  }
  /* When open on mobile */
  .sidebar.mobile-open {
    transform: translateX(0) !important;
  }
  /* collapsed class does nothing on mobile — we use mobile-open instead */
  .sidebar.collapsed {
    width: var(--sidebar-w) !important;
    transform: translateX(-100%);
  }
}

/* ══ MAIN ══ */
.main { flex: 1; padding: 20px; min-width: 0; }

/* ══ VIEWS ══ */
.view { display: none; }
.view.active { display: block; }

/* ══ CALENDAR TOOLBAR ══ */
.cal-toolbar {
  background: var(--white);
  border: 1px solid var(--gray-200);
  border-radius: var(--radius) var(--radius) 0 0;
  display: flex;
  align-items: center;
  justify-content: flex-end;
  flex-wrap: wrap;
  gap: 8px;
  padding: 10px 14px;
}
.cal-nav-btn {
  background: none;
  border: 1px solid var(--gray-200);
  width: 30px; height: 30px;
  border-radius: 4px;
  cursor: pointer;
  font-size: 16px;
  color: var(--gray-600);
  display: flex; align-items: center; justify-content: center;
  transition: background .15s;
  flex-shrink: 0;
}
.cal-nav-btn:hover { background: var(--gray-100); }
.cal-date-label {
  border: 1px solid var(--gray-200);
  border-radius: 4px;
  padding: 4px 12px;
  font-size: 14px;
  font-weight: 600;
  color: var(--gray-800);
  min-width: 120px;
  text-align: center;
}
.cal-today-btn {
  border: 1px solid var(--gray-200);
  background: var(--white);
  border-radius: 4px;
  padding: 4px 12px;
  font-size: 14px;
  cursor: pointer;
  color: var(--gray-600);
  font-weight: 500;
  transition: background .15s;
}
.cal-today-btn:hover { background: var(--gray-100); }
.cal-view-select {
  border: 1px solid var(--gray-200);
  border-radius: 4px;
  padding: 4px 10px;
  font-size: 14px;
  color: var(--gray-600);
  background: var(--white);
  cursor: pointer;
}

/* ══ DOCTOR LABEL ══ */
.doctor-label {
  text-align: center;
  padding: 5px;
  font-size: 13px;
  font-weight: 600;
  color: var(--blue);
  background: var(--white);
  border-left: 1px solid var(--gray-200);
  border-right: 1px solid var(--gray-200);
}

/* ══ CALENDAR GRID ══ */
.cal-grid {
  background: var(--white);
  border: 1px solid var(--gray-200);
  border-top: none;
  border-radius: 0 0 var(--radius) var(--radius);
  overflow: hidden;
}
.cal-header {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  border-bottom: 1px solid var(--gray-200);
}
.cal-header-cell {
  padding: 8px 4px;
  text-align: center;
  font-size: 11px;
  font-weight: 700;
  color: var(--gray-400);
  letter-spacing: .4px;
  text-transform: uppercase;
}
.cal-header-cell.today-col { color: var(--blue); }
.cal-body { display: grid; grid-template-columns: repeat(7, 1fr); }
.cal-cell {
  min-height: 100px;
  border-right: 1px solid var(--gray-200);
  border-bottom: 1px solid var(--gray-200);
  padding: 6px;
  cursor: pointer;
  transition: background .12s;
  overflow: hidden;
}
.cal-cell:nth-child(7n) { border-right: none; }
.cal-cell:hover { background: var(--gray-50); }
.cal-cell.other-month .cal-day { color: var(--gray-300); }
.cal-cell.today { background: var(--blue-light); }
.cal-day {
  font-size: 13px;
  font-weight: 500;
  color: var(--gray-600);
  margin-bottom: 4px;
  line-height: 1;
}
.cal-cell.today .cal-day {
  background: var(--blue);
  color: var(--white);
  width: 24px; height: 24px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-weight: 700;
}

/* ══ CHIPS ══ */
.apt-chip {
  background: var(--green);
  color: var(--white);
  border-radius: 4px;
  padding: 4px 5px;
  margin-bottom: 3px;
  display: flex;
  flex-direction: column;
  gap: 2px;
  transition: filter .15s;
  overflow: hidden;
}
.apt-chip:hover { filter: brightness(1.08); }
.apt-chip-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 3px;
}
.apt-chip-name {
  font-size: 11px;
  font-weight: 600;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  flex: 1;
}
.apt-chip-time { font-size: 10px; opacity: .9; }
.apt-chip-actions { display: flex; gap: 2px; flex-shrink: 0; }
.apt-chip-actions button {
  background: none;
  border: none;
  color: rgba(255,255,255,.85);
  cursor: pointer;
  font-size: 11px;
  padding: 1px 2px;
  border-radius: 2px;
  line-height: 1;
}
.apt-chip-actions button:hover { color: var(--white); background: rgba(255,255,255,.2); }

/* ══ DASHBOARD ══ */
.dashboard-title { font-size: 22px; font-weight: 700; color: var(--gray-800); margin-bottom: 16px; }
.dash-filters { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 16px; align-items: center; }
.dash-search { position: relative; }
.dash-search input {
  border: 1px solid var(--gray-200);
  border-radius: var(--radius);
  padding: 7px 12px 7px 32px;
  font-size: 13px;
  width: 170px;
  outline: none;
  transition: border-color .15s;
  background: var(--white);
}
.dash-search input:focus { border-color: var(--blue); }
.dash-search .search-icon {
  position: absolute;
  left: 9px; top: 50%;
  transform: translateY(-50%);
  color: var(--gray-400);
  font-size: 14px;
  pointer-events: none;
}
.date-range { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
.date-range input[type="date"] {
  border: 1px solid var(--gray-200);
  border-radius: var(--radius);
  padding: 7px 10px;
  font-size: 13px;
  color: var(--gray-600);
  background: var(--white);
  outline: none;
  cursor: pointer;
  transition: border-color .15s;
}
.date-range input[type="date"]:focus { border-color: var(--blue); }
.date-sep { color: var(--gray-400); font-size: 13px; }
.btn-update {
  background: var(--blue);
  color: var(--white);
  border: none;
  border-radius: var(--radius);
  padding: 7px 18px;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: background .15s;
}
.btn-update:hover { background: var(--blue-dark); }

/* ══ TABLE ══ */
.table-wrap { background: var(--white); border: 1px solid var(--gray-200); border-radius: var(--radius); overflow: auto; }
table { width: 100%; border-collapse: collapse; min-width: 600px; }
thead th { padding: 11px 14px; text-align: left; font-size: 13px; font-weight: 700; color: var(--gray-800); border-bottom: 2px solid var(--gray-200); white-space: nowrap; }
tbody tr { border-bottom: 1px solid var(--gray-100); transition: background .12s; }
tbody tr:last-child { border-bottom: none; }
tbody tr:hover { background: var(--gray-50); }
tbody td { padding: 10px 14px; font-size: 13px; color: var(--gray-600); }
.link-cell { color: var(--blue); font-weight: 500; }
.time-cell { color: var(--blue); font-size: 12px; }
.action-cell { display: flex; gap: 8px; }
.btn-edit, .btn-del { background: none; border: none; cursor: pointer; font-size: 16px; padding: 2px 4px; border-radius: 3px; transition: background .12s; }
.btn-edit { color: var(--blue); }
.btn-del  { color: var(--red); }
.btn-edit:hover { background: var(--blue-light); }
.btn-del:hover  { background: #ffebee; }
.empty-row td { text-align: center; padding: 40px; color: var(--gray-300); font-style: italic; }

/* ══ MODAL ══ */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.38);
  z-index: 400;
  align-items: center;
  justify-content: center;
  padding: 16px;
}
.modal-overlay.open { display: flex; }
.modal {
  background: var(--white);
  border-radius: 10px;
  box-shadow: var(--shadow-lg);
  width: 100%;
  max-width: 540px;
  max-height: calc(100vh - 40px);
  overflow-y: auto;
  animation: slideUp .22s ease;
}
@keyframes slideUp { from { opacity:0; transform:translateY(28px); } to { opacity:1; transform:translateY(0); } }
.modal-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 18px 22px 14px;
  border-bottom: 1px solid var(--gray-100);
  position: sticky;
  top: 0;
  background: var(--white);
  z-index: 1;
}
.modal-title { font-size: 16px; font-weight: 700; color: var(--gray-800); }
.modal-close { background: none; border: none; font-size: 22px; color: var(--gray-400); cursor: pointer; line-height: 1; padding: 2px 6px; border-radius: 4px; transition: background .12s; }
.modal-close:hover { background: var(--gray-100); color: var(--gray-800); }
.modal-body { padding: 20px 22px; }
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.form-group { display: flex; flex-direction: column; gap: 5px; }
.form-group.full-width { grid-column: 1 / -1; }
.form-label { font-size: 11px; font-weight: 700; color: var(--gray-600); text-transform: uppercase; letter-spacing: .5px; }
.form-control { border: 1px solid var(--gray-200); border-radius: var(--radius); padding: 9px 12px; font-size: 14px; color: var(--gray-800); outline: none; transition: border-color .15s; background: var(--white); font-family: inherit; width: 100%; }
.form-control:focus { border-color: var(--blue); }
.form-control.error { border-color: var(--red); }
.error-msg { color: var(--red); font-size: 11px; }
.modal-footer { display: flex; justify-content: flex-end; gap: 10px; padding: 14px 22px 18px; border-top: 1px solid var(--gray-100); }
.btn-cancel { border: 1px solid var(--gray-200); background: var(--white); color: var(--gray-600); border-radius: var(--radius); padding: 8px 22px; font-size: 14px; font-weight: 600; cursor: pointer; transition: background .15s; }
.btn-cancel:hover { background: var(--gray-100); }
.btn-save { background: var(--blue); color: var(--white); border: none; border-radius: var(--radius); padding: 8px 24px; font-size: 14px; font-weight: 600; cursor: pointer; transition: background .15s; }
.btn-save:hover { background: var(--blue-dark); }

/* ══ TOAST ══ */
.toast { position: fixed; bottom: 24px; right: 24px; background: var(--gray-800); color: var(--white); padding: 12px 20px; border-radius: var(--radius); font-size: 14px; z-index: 999; opacity: 0; transform: translateY(12px); transition: opacity .25s, transform .25s; pointer-events: none; box-shadow: var(--shadow); }
.toast.show { opacity: 1; transform: translateY(0); }
.toast.success { background: var(--green); }
.toast.error   { background: var(--red); }

/* ══ RESPONSIVE ══ */
@media (max-width: 768px) {
  .main { padding: 12px 10px; }
  .cal-cell { min-height: 70px; padding: 4px; }
  .cal-header-cell { font-size: 9px; padding: 6px 2px; letter-spacing: 0; }
  .cal-day { font-size: 11px; }
  .apt-chip-name { font-size: 10px; }
  .apt-chip-time { font-size: 9px; }
  .form-grid { grid-template-columns: 1fr; }
  .dash-filters { flex-direction: column; align-items: stretch; }
  .dash-search input { width: 100%; }
}
@media (max-width: 480px) {
  .topbar { padding: 0 10px; }
  .logo { font-size: 15px; }
  .btn-book { padding: 7px 12px; font-size: 12px; }
  .cal-cell { min-height: 55px; padding: 3px; }
  .cal-header-cell { font-size: 8px; }
  .apt-chip { padding: 2px 3px; }
  .apt-chip-name { font-size: 9px; }
  .apt-chip-time { font-size: 8px; }
}
</style>
</head>
<body>

<!-- TOPBAR: hamburger is HERE, always visible at all screen sizes -->
<header class="topbar">
  <div class="topbar-left">
    <button class="hamburger" id="hamburgerBtn" aria-label="Toggle menu">
      <span></span><span></span><span></span>
    </button>
    <div class="logo">
      <div class="logo-diamond"></div>
      CAPMINDS
    </div>
  </div>
  <button class="btn-book" id="btnBookTop">
    <span style="font-size:17px;line-height:1">+</span>
    <span>Book Appointment</span>
  </button>
</header>

<!-- Mobile backdrop -->
<div class="sidebar-backdrop" id="sidebarBackdrop"></div>

<div class="app-body">

  <!-- SIDEBAR (no toggle button inside — it's in topbar now) -->
  <nav class="sidebar" id="sidebar">
    <div class="nav-item active" data-view="calendar">
      <span class="nav-icon">📅</span>
      <span>Calendar</span>
    </div>
    <div class="nav-item" data-view="dashboard">
      <span class="nav-icon">&#x229E;</span>
      <span>Dashboard</span>
    </div>
  </nav>

  <main class="main">

    <!-- CALENDAR VIEW -->
    <div class="view active" id="view-calendar">
      <div class="cal-toolbar">
        <button class="cal-nav-btn" id="calPrev">&#8249;</button>
        <div class="cal-date-label" id="calDateLabel"></div>
        <button class="cal-nav-btn" id="calNext">&#8250;</button>
        <button class="cal-today-btn" id="calToday">Today</button>
        <select class="cal-view-select"><option>Month</option></select>
      </div>
      <div class="doctor-label" id="doctorLabel">All Doctors</div>
      <div class="cal-grid">
        <div class="cal-header" id="calHeader"></div>
        <div class="cal-body"   id="calBody"></div>
      </div>
    </div>

    <!-- DASHBOARD VIEW -->
    <div class="view" id="view-dashboard">
      <h2 class="dashboard-title">Practice Dashboard</h2>
      <div class="dash-filters">
        <div class="dash-search">
          <span class="search-icon">&#x1F50D;</span>
          <input type="text" id="filterPatient" placeholder="Patient Search"/>
        </div>
        <div class="dash-search">
          <span class="search-icon">&#x1F50D;</span>
          <input type="text" id="filterDoctor" placeholder="Doctor Search"/>
        </div>
        <div class="date-range">
          <input type="date" id="filterDateFrom"/>
          <span class="date-sep">—</span>
          <input type="date" id="filterDateTo"/>
        </div>
        <button class="btn-update" id="btnUpdate">Update</button>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Patient</th><th>Doctor</th><th>Hospital</th>
              <th>Specialty</th><th>Date</th><th>Time</th><th>Action</th>
            </tr>
          </thead>
          <tbody id="aptTableBody"></tbody>
        </table>
      </div>
    </div>

  </main>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal" role="dialog" aria-modal="true">
    <div class="modal-header">
      <span class="modal-title" id="modalTitle">Schedule Appointment</span>
      <button class="modal-close" id="modalClose">&times;</button>
    </div>
    <div class="modal-body">
      <div class="form-grid">
        <div class="form-group">
          <label class="form-label">Patient Name</label>
          <input class="form-control" id="fPatient" type="text" placeholder="Enter patient name" autocomplete="off"/>
          <span class="error-msg" id="errPatient"></span>
        </div>
        <div class="form-group">
          <label class="form-label">Doctor Name</label>
          <input class="form-control" id="fDoctor" type="text" placeholder="Enter doctor name" autocomplete="off"/>
          <span class="error-msg" id="errDoctor"></span>
        </div>
        <div class="form-group">
          <label class="form-label">Hospital Name</label>
          <input class="form-control" id="fHospital" type="text" placeholder="Enter hospital name" autocomplete="off"/>
          <span class="error-msg" id="errHospital"></span>
        </div>
        <div class="form-group">
          <label class="form-label">Specialty</label>
          <select class="form-control" id="fSpecialty">
            <option value="">Select Specialty</option>
            <option>Cardiology</option><option>Dermatology</option>
            <option>Neurology</option><option>Orthopedics</option>
            <option>Pediatrics</option><option>Psychiatry</option>
            <option>General Medicine</option><option>ENT</option>
            <option>Oncology</option><option>Ophthalmology</option>
          </select>
          <span class="error-msg" id="errSpecialty"></span>
        </div>
        <div class="form-group">
          <label class="form-label">Date</label>
          <input class="form-control" id="fDate" type="date"/>
          <span class="error-msg" id="errDate"></span>
        </div>
        <div class="form-group">
          <label class="form-label">Time</label>
          <input class="form-control" id="fTime" type="time"/>
          <span class="error-msg" id="errTime"></span>
        </div>
        <div class="form-group full-width">
          <label class="form-label">Reason</label>
          <textarea class="form-control" id="fReason" rows="3" placeholder="Reason for visit..."></textarea>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" id="btnCancel">Cancel</button>
      <button class="btn-save"   id="btnSave">Save</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ══ DATA ══ */
const STORAGE_KEY = 'capminds_apts_v3';
function loadData() { try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; } catch { return []; } }
function saveData(d) { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(d)); } catch {} }
let appointments = loadData();
let editingId = null;
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2); }

/* ══ CALENDAR STATE ══ */
const today  = new Date();
let calYear  = today.getFullYear();
let calMonth = today.getMonth();
const DAYS   = ['SUN','MON','TUE','WED','THU','FRI','SAT'];
const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];

/* ══ SIDEBAR ══
   KEY FIX: hamburger is in the topbar.
   Desktop (>768px): sidebar uses width transition (200px ↔ 0).
   Mobile (≤768px): sidebar is position:fixed, uses translateX(-100%) ↔ translateX(0).
*/
const sidebarEl = document.getElementById('sidebar');
const burger    = document.getElementById('hamburgerBtn');
const backdrop  = document.getElementById('sidebarBackdrop');

function isMobile() { return window.innerWidth <= 768; }

// Track open state separately for mobile and desktop
let desktopOpen = true;   // desktop: sidebar starts open
let mobileOpen  = false;  // mobile: sidebar starts closed

function applyState() {
  if (isMobile()) {
    sidebarEl.classList.toggle('mobile-open', mobileOpen);
    backdrop.classList.toggle('show', mobileOpen);
    burger.classList.toggle('is-open', mobileOpen);
  } else {
    sidebarEl.classList.remove('mobile-open');
    sidebarEl.classList.toggle('collapsed', !desktopOpen);
    backdrop.classList.remove('show');
    burger.classList.toggle('is-open', desktopOpen);
  }
}

burger.addEventListener('click', () => {
  if (isMobile()) {
    mobileOpen = !mobileOpen;
  } else {
    desktopOpen = !desktopOpen;
  }
  applyState();
});

backdrop.addEventListener('click', () => {
  mobileOpen = false;
  applyState();
});

window.addEventListener('resize', applyState);

// Init
applyState();

/* ══ NAV ══ */
document.querySelectorAll('.nav-item').forEach(item => {
  item.addEventListener('click', () => {
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    item.classList.add('active');
    const v = item.dataset.view;
    document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
    document.getElementById('view-' + v).classList.add('active');
    if (v === 'dashboard') renderTable(appointments);
    if (isMobile()) { mobileOpen = false; applyState(); }
  });
});

/* ══ CALENDAR ══ */
function renderCalendar() {
  document.getElementById('calDateLabel').textContent = MONTHS[calMonth] + ' ' + calYear;

  const header = document.getElementById('calHeader');
  header.innerHTML = '';
  DAYS.forEach((d, i) => {
    const c = document.createElement('div');
    c.className = 'cal-header-cell';
    if (i === today.getDay() && calYear === today.getFullYear() && calMonth === today.getMonth())
      c.classList.add('today-col');
    c.textContent = d;
    header.appendChild(c);
  });

  const body      = document.getElementById('calBody');
  body.innerHTML  = '';
  const firstDay  = new Date(calYear, calMonth, 1).getDay();
  const daysInMon = new Date(calYear, calMonth + 1, 0).getDate();
  const prevDays  = new Date(calYear, calMonth, 0).getDate();

  for (let i = 0; i < 42; i++) {
    const cell = document.createElement('div');
    cell.className = 'cal-cell';
    let day, mon, yr, isOther = false;

    if (i < firstDay) {
      day = prevDays - firstDay + 1 + i; mon = calMonth - 1; yr = calYear;
      if (mon < 0) { mon = 11; yr--; }
      isOther = true;
    } else if (i - firstDay < daysInMon) {
      day = i - firstDay + 1; mon = calMonth; yr = calYear;
    } else {
      day = i - firstDay - daysInMon + 1; mon = calMonth + 1; yr = calYear;
      if (mon > 11) { mon = 0; yr++; }
      isOther = true;
    }

    if (isOther) cell.classList.add('other-month');
    if (!isOther && day === today.getDate() && calMonth === today.getMonth() && calYear === today.getFullYear())
      cell.classList.add('today');

    const dayEl = document.createElement('div');
    dayEl.className = 'cal-day';
    dayEl.textContent = day;
    cell.appendChild(dayEl);

    const dateStr = fmtDate(yr, mon, day);
    appointments.filter(a => a.date === dateStr).forEach(apt => cell.appendChild(makeChip(apt)));

    cell.addEventListener('click', e => {
      if (e.target.closest('.apt-chip-actions')) return;
      openModal(null, dateStr);
    });

    body.appendChild(cell);
  }

  const docs = [...new Set(appointments.map(a => a.doctor).filter(Boolean))];
  document.getElementById('doctorLabel').textContent = docs.length ? docs.join(' · ') : 'All Doctors';
}

function makeChip(apt) {
  const chip = document.createElement('div');
  chip.className = 'apt-chip';
  chip.innerHTML = `
    <div class="apt-chip-top">
      <span class="apt-chip-name">${esc(apt.patient)}</span>
      <div class="apt-chip-actions">
        <button title="Edit"   onclick="openModal('${apt.id}')">&#x270E;</button>
        <button title="Delete" onclick="deleteApt('${apt.id}')">&#x1F5D1;</button>
      </div>
    </div>
    <div class="apt-chip-time">${fmtTime12(apt.time)}</div>`;
  return chip;
}

document.getElementById('calPrev').addEventListener('click', () => {
  if (--calMonth < 0) { calMonth = 11; calYear--; } renderCalendar();
});
document.getElementById('calNext').addEventListener('click', () => {
  if (++calMonth > 11) { calMonth = 0; calYear++; } renderCalendar();
});
document.getElementById('calToday').addEventListener('click', () => {
  calYear = today.getFullYear(); calMonth = today.getMonth(); renderCalendar();
});

/* ══ MODAL ══ */
function openModal(id, prefillDate) {
  editingId = id || null;
  clearForm();
  document.getElementById('modalTitle').textContent = id ? 'Edit Appointment' : 'Schedule Appointment';
  if (id) {
    const a = appointments.find(x => x.id === id);
    if (a) {
      document.getElementById('fPatient').value   = a.patient;
      document.getElementById('fDoctor').value    = a.doctor;
      document.getElementById('fHospital').value  = a.hospital;
      document.getElementById('fSpecialty').value = a.specialty;
      document.getElementById('fDate').value      = a.date;
      document.getElementById('fTime').value      = a.time;
      document.getElementById('fReason').value    = a.reason;
    }
  } else if (prefillDate) {
    document.getElementById('fDate').value = prefillDate;
  }
  document.getElementById('modalOverlay').classList.add('open');
  setTimeout(() => document.getElementById('fPatient').focus(), 50);
}
function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  editingId = null; clearForm();
}
function clearForm() {
  ['fPatient','fDoctor','fHospital','fSpecialty','fDate','fTime','fReason']
    .forEach(id => { const el = document.getElementById(id); el.value = ''; el.classList.remove('error'); });
  ['errPatient','errDoctor','errHospital','errSpecialty','errDate','errTime']
    .forEach(id => { document.getElementById(id).textContent = ''; });
}
document.getElementById('btnBookTop').addEventListener('click', () => openModal());
document.getElementById('modalClose').addEventListener('click', closeModal);
document.getElementById('btnCancel').addEventListener('click', closeModal);
document.getElementById('modalOverlay').addEventListener('click', e => {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
});

/* ══ SAVE ══ */
function validate() {
  let ok = true;
  [['fPatient','errPatient','Patient name required.'],
   ['fDoctor','errDoctor','Doctor name required.'],
   ['fHospital','errHospital','Hospital name required.'],
   ['fSpecialty','errSpecialty','Please select a specialty.'],
   ['fDate','errDate','Date is required.'],
   ['fTime','errTime','Time is required.']].forEach(([fid,eid,msg]) => {
    const el = document.getElementById(fid);
    if (!el.value.trim()) { el.classList.add('error'); document.getElementById(eid).textContent = msg; ok = false; }
    else { el.classList.remove('error'); document.getElementById(eid).textContent = ''; }
  });
  return ok;
}
document.getElementById('btnSave').addEventListener('click', () => {
  if (!validate()) return;
  const apt = {
    id: editingId || uid(),
    patient:  document.getElementById('fPatient').value.trim(),
    doctor:   document.getElementById('fDoctor').value.trim(),
    hospital: document.getElementById('fHospital').value.trim(),
    specialty:document.getElementById('fSpecialty').value,
    date:     document.getElementById('fDate').value,
    time:     document.getElementById('fTime').value,
    reason:   document.getElementById('fReason').value.trim(),
  };
  if (editingId) {
    const idx = appointments.findIndex(a => a.id === editingId);
    if (idx > -1) appointments[idx] = apt;
    showToast('Appointment updated!', 'success');
  } else {
    appointments.push(apt);
    showToast('Appointment booked!', 'success');
  }
  saveData(appointments); closeModal(); renderCalendar();
  if (document.getElementById('view-dashboard').classList.contains('active')) renderTable(appointments);
});

/* ══ DELETE ══ */
function deleteApt(id) {
  if (!confirm('Delete this appointment?')) return;
  appointments = appointments.filter(a => a.id !== id);
  saveData(appointments); renderCalendar();
  if (document.getElementById('view-dashboard').classList.contains('active')) renderTable(applyFilters());
  showToast('Deleted.', 'error');
}
window.openModal = openModal;
window.deleteApt = deleteApt;

/* ══ TABLE ══ */
function renderTable(data) {
  const tbody = document.getElementById('aptTableBody');
  tbody.innerHTML = '';
  if (!data.length) { tbody.innerHTML = '<tr class="empty-row"><td colspan="7">No appointments found.</td></tr>'; return; }
  data.forEach(apt => {
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td class="link-cell">${esc(apt.patient)}</td>
      <td class="link-cell">${esc(apt.doctor)}</td>
      <td>${esc(apt.hospital)}</td>
      <td>${esc(apt.specialty)}</td>
      <td>${fmtDisplayDate(apt.date)}</td>
      <td class="time-cell">${fmtTime12(apt.time)} – ${addMins(apt.time,15)}</td>
      <td><div class="action-cell">
        <button class="btn-edit" onclick="openModal('${apt.id}')">&#x270E;</button>
        <button class="btn-del"  onclick="deleteApt('${apt.id}')">&#x1F5D1;</button>
      </div></td>`;
    tbody.appendChild(tr);
  });
}
function applyFilters() {
  const p  = document.getElementById('filterPatient').value.trim().toLowerCase();
  const d  = document.getElementById('filterDoctor').value.trim().toLowerCase();
  const df = document.getElementById('filterDateFrom').value;
  const dt = document.getElementById('filterDateTo').value;
  return appointments.filter(a => {
    if (p  && !a.patient.toLowerCase().includes(p)) return false;
    if (d  && !a.doctor.toLowerCase().includes(d))  return false;
    if (df && a.date < df) return false;
    if (dt && a.date > dt) return false;
    return true;
  });
}
document.getElementById('btnUpdate').addEventListener('click', () => renderTable(applyFilters()));
['filterPatient','filterDoctor'].forEach(id =>
  document.getElementById(id).addEventListener('input', () => renderTable(applyFilters())));

/* ══ HELPERS ══ */
function fmtDate(y,m,d) { return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`; }
function fmtDisplayDate(s) { if(!s)return''; const[y,m,d]=s.split('-'); return `${d}/${m}/${y}`; }
function fmtTime12(t) { if(!t)return''; const[h,m]=t.split(':').map(Number); return `${h%12||12}:${String(m).padStart(2,'0')} ${h>=12?'PM':'AM'}`; }
function addMins(t,mins) { if(!t)return''; const[h,m]=t.split(':').map(Number); const tot=h*60+m+mins; return fmtTime12(`${String(Math.floor(tot/60)%24).padStart(2,'0')}:${String(tot%60).padStart(2,'0')}`); }
function esc(s) { return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

/* ══ TOAST ══ */
let toastT;
function showToast(msg,type='') {
  const t=document.getElementById('toast');
  t.textContent=msg; t.className='toast '+type;
  void t.offsetWidth; t.classList.add('show');
  clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove('show'),2800);
}

document.addEventListener('keydown', e => { if(e.key==='Escape') closeModal(); });

/* ══ INIT ══ */
renderCalendar();
renderTable(appointments);
</script>
<script>
  
</script>
</body>
</html>
